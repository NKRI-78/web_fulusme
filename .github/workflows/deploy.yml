name: Deploy to Production (VPS)

# Deploy strategy:
# - Build happens ON the VPS (env sudah tersedia di server, sama seperti flow manual).
# - Build ke direktori terpisah (.next-build) lalu di-swap atomik ke `.next`,
#   supaya `.next` yang sedang dilayani `next start` tidak pernah kosong/korup
#   (mencegah incident chunk-500 / blank page).
# - Cache Next.js (.next/cache) dibawa ke build baru supaya build incremental (lebih cepat).

# Trigger:
# - Otomatis setiap push/merge ke `main`.
# - Bisa juga dijalankan manual lewat tombol "Run workflow" (workflow_dispatch).
# Catatan: perubahan yang hanya menyentuh dokumentasi tidak memicu deploy.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false # jangan batalkan deploy yang sedang jalan

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production # aktifkan required reviewer di Settings > Environments (butuh plan berbayar)

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 20m
          script: |
            # Load Node/npm/pm2 into PATH. SSH runs a non-interactive, non-login
            # shell, so ~/.bashrc / nvm are NOT sourced automatically (itu sebabnya
            # `npm: command not found` walau flow manual berhasil).
            # Source nvm SEBELUM `set -u` karena nvm.sh memakai unbound variables.
            export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use default >/dev/null 2>&1 || true

            set -euo pipefail

            APP_PATH="${{ secrets.VPS_APP_PATH }}"
            PM2_APP="web-fulusme"
            HEALTH_URL="http://127.0.0.1:3336"

            command -v npm >/dev/null 2>&1 || { echo "ERROR: npm tidak ditemukan di PATH"; exit 127; }
            command -v pm2 >/dev/null 2>&1 || { echo "ERROR: pm2 tidak ditemukan di PATH"; exit 127; }

            cd "$APP_PATH"

            echo "==> Sync source (main)"
            git fetch --prune origin
            git reset --hard origin/main

            echo "==> Install dependencies"
            npm ci

            echo "==> Build to .next-build (live .next tetap dilayani)"
            rm -rf .next-build
            # Bawa cache dari build sebelumnya supaya build incremental (lebih cepat).
            if [ -d .next/cache ]; then
              mkdir -p .next-build
              cp -r .next/cache .next-build/cache
            fi
            NEXT_DIST_DIR=.next-build npm run build

            echo "==> Atomic swap .next"
            rm -rf .next-old
            if [ -d .next ]; then mv .next .next-old; fi
            mv .next-build .next

            echo "==> Restart PM2"
            pm2 restart "$PM2_APP" --update-env

            echo "==> Health check (retry hingga 30 detik)"
            ok=0
            for i in $(seq 1 15); do
              if curl -fsS -o /dev/null "$HEALTH_URL"; then
                ok=1
                break
              fi
              echo "   belum siap (percobaan $i)... tunggu 2 detik"
              sleep 2
            done

            if [ "$ok" -eq 1 ]; then
              echo "OK: app responding"
              rm -rf .next-old
            else
              echo "FAIL: rolling back .next"
              rm -rf .next
              mv .next-old .next
              pm2 restart "$PM2_APP" --update-env
              exit 1
            fi
